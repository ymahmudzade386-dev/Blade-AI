<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blade AI</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}
header{
background:#111827;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}
#chat{
flex:1;
overflow-y:auto;
padding:15px;
}
.msg{
padding:12px;
border-radius:10px;
margin:10px 0;
max-width:80%;
}
.user{
background:#2563eb;
margin-left:auto;
}
.ai{
background:#1f2937;
}
.bottom{
display:flex;
padding:10px;
background:#111827;
}
input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}
button{
margin-left:10px;
padding:12px 20px;
background:#22c55e;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}
</style>
</head>
<body>

<header>🤖 Blade AI</header>

<div id="chat">
<div class="msg ai">Merhaba! Ben Blade AI. Yakında gerçek yapay zekâ ile çalışacağım.</div>
</div>

<div class="bottom">
<input id="text" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>
</div>

<script>
function send(){
let t=document.getElementById("text").value;
if(!t)return;

document.getElementById("chat").innerHTML+=
"<div class='msg user'>"+t+"</div>";

document.getElementById("chat").innerHTML+=
"<div class='msg ai'>Bu sürümde henüz AI bağlı değil.</div>";

document.getElementById("text").value="";
document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
}
</script>

</body>
</html>
