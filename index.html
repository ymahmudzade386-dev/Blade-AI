<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blade AI</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
margin:0;
}
h1{
background:#222;
padding:15px;
margin:0;
text-align:center;
}
#chat{
height:75vh;
overflow:auto;
padding:10px;
}
.msg{
margin:10px 0;
padding:10px;
border-radius:10px;
}
.user{
background:#007bff;
margin-left:auto;
max-width:80%;
}
.ai{
background:#333;
max-width:80%;
}
.bottom{
display:flex;
padding:10px;
background:#222;
}
input{
flex:1;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
}
button{
margin-left:10px;
padding:12px 18px;
border:none;
background:#00c853;
color:white;
border-radius:8px;
font-size:16px;
}
</style>

</head>
<body>

<h1>Blade AI</h1>

<div id="chat"></div>

<div class="bottom">
<input id="text" placeholder="Bir şey yaz...">
<button onclick="send()">Gönder</button>
</div>

<script>
async function send(){

const input=document.getElementById("text");
const text=input.value;

if(!text)return;

const chat=document.getElementById("chat");

chat.innerHTML+=`<div class="msg user">${text}</div>`;

input.value="";

const r=await fetch("/api",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data=await r.text();

chat.innerHTML+=`<div class="msg ai">${data}</div>`;

chat.scrollTop=chat.scrollHeight;

}
</script>

</body>
</html>
